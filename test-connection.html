<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldMind Connection Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 2px solid #333;
        }
        .success { background: #1a3a1a; border-color: #4ade80; color: #4ade80; }
        .error { background: #3a1a1a; border-color: #ef4444; color: #ef4444; }
        .pending { background: #3a3a1a; border-color: #fbbf24; color: #fbbf24; }
        .info { background: #1a1a3a; border-color: #60a5fa; color: #60a5fa; }
        h1 { color: #fbbf24; }
        button {
            background: #fbbf24;
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px 5px;
        }
        button:hover { background: #f59e0b; }
        pre {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .log {
            max-height: 300px;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .log-entry {
            margin: 5px 0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>⚡ FIELDMIND CONNECTION TEST</h1>
    
    <div class="status info">
        <strong>Backend URL:</strong> wss://fieldmind-backend-809015144044.us-central1.run.app/ws
    </div>

    <div class="status info">
        <strong>Frontend URL:</strong> https://feisty-parity-416714.web.app
    </div>

    <button onclick="testBackendHealth()">1. Test Backend Health</button>
    <button onclick="testWebSocket()">2. Test WebSocket Connection</button>
    <button onclick="openApp()">3. Open FieldMind App</button>
    <button onclick="clearLog()">Clear Log</button>

    <div id="results"></div>
    <div class="log" id="log"></div>

    <script>
        const BACKEND_URL = 'https://fieldmind-backend-809015144044.us-central1.run.app';
        const WS_URL = 'wss://fieldmind-backend-809015144044.us-central1.run.app/ws';
        const APP_URL = 'https://feisty-parity-416714.web.app';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = type === 'error' ? '#ef4444' : type === 'success' ? '#4ade80' : '#60a5fa';
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('results').innerHTML = '';
        }

        async function testBackendHealth() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="status pending">Testing backend health endpoint...</div>';
            log('Testing backend health endpoint...');

            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                const data = await response.json();
                
                if (response.ok && data.status === 'healthy') {
                    resultsDiv.innerHTML = `
                        <div class="status success">
                            ✅ BACKEND IS HEALTHY!
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                    log('✅ Backend health check passed', 'success');
                } else {
                    resultsDiv.innerHTML = `
                        <div class="status error">
                            ❌ Backend returned unexpected response
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                    log('❌ Backend health check failed', 'error');
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="status error">
                        ❌ BACKEND CONNECTION FAILED!
                        <pre>${error.message}</pre>
                    </div>
                `;
                log(`❌ Backend connection error: ${error.message}`, 'error');
            }
        }

        function testWebSocket() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="status pending">Testing WebSocket connection...</div>';
            log('Attempting WebSocket connection...');

            const sessionId = 'test-' + Math.random().toString(36).substring(7);
            const ws = new WebSocket(`${WS_URL}/${sessionId}`);
            
            let connected = false;
            const timeout = setTimeout(() => {
                if (!connected) {
                    ws.close();
                    resultsDiv.innerHTML = `
                        <div class="status error">
                            ❌ WEBSOCKET CONNECTION TIMEOUT!
                            <p>Connection took too long. Backend might be down or URL is incorrect.</p>
                        </div>
                    `;
                    log('❌ WebSocket connection timeout', 'error');
                }
            }, 10000);

            ws.onopen = () => {
                connected = true;
                clearTimeout(timeout);
                resultsDiv.innerHTML = `
                    <div class="status success">
                        ✅ WEBSOCKET CONNECTED!
                        <p>Session ID: ${sessionId}</p>
                        <p>Sending ping...</p>
                    </div>
                `;
                log('✅ WebSocket connected successfully', 'success');
                
                // Send a ping
                ws.send(JSON.stringify({
                    type: 'ping',
                    session_id: sessionId,
                    timestamp: Date.now()
                }));
                log('Sent ping message');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`Received: ${data.type}`, 'success');
                
                if (data.type === 'pong' || data.type === 'status' || data.type === 'session_ready') {
                    resultsDiv.innerHTML = `
                        <div class="status success">
                            ✅ WEBSOCKET FULLY WORKING!
                            <p>✅ Connection established</p>
                            <p>✅ Ping/Pong working</p>
                            <p>✅ Backend responding correctly</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            <p><strong>🎉 YOUR APP WILL WORK PERFECTLY!</strong></p>
                        </div>
                    `;
                    setTimeout(() => ws.close(), 2000);
                }
            };

            ws.onerror = (error) => {
                clearTimeout(timeout);
                resultsDiv.innerHTML = `
                    <div class="status error">
                        ❌ WEBSOCKET ERROR!
                        <p>Failed to establish WebSocket connection.</p>
                        <p>Check if backend is running and URL is correct.</p>
                    </div>
                `;
                log('❌ WebSocket error occurred', 'error');
            };

            ws.onclose = (event) => {
                if (connected) {
                    log(`WebSocket closed (code: ${event.code})`, 'info');
                }
            };
        }

        function openApp() {
            log('Opening FieldMind app...');
            window.open(APP_URL, '_blank');
        }

        // Auto-run tests on load
        window.onload = () => {
            log('Connection test page loaded');
            log('Click buttons above to test connection');
        };
    </script>
</body>
</html>
