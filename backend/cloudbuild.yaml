substitutions:
  _GEMINI_API_KEY: ''
  _SENDGRID_API_KEY: ''
  _DISPATCH_EMAIL: 'dispatch@fieldmind.app'
  _SERVICE_NAME: 'fieldmind-backend'
  _REGION: 'us-central1'
  _REPO: 'fieldmind'

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest'
      - '.'

  # Push image (both tags)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend']

  # Deploy to Cloud Run with all env vars
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--port=8080'
      - '--timeout=300'
      - >-
        --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},PUBSUB_TOPIC=field-escalations,GEMINI_API_KEY=${_GEMINI_API_KEY},SENDGRID_API_KEY=${_SENDGRID_API_KEY},DISPATCH_EMAIL=${_DISPATCH_EMAIL}

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
